repos:
  # ── Basic file checks ──
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
      - id: check-toml
      - id: check-yaml
      - id: check-json
      - id: mixed-line-ending
      - id: detect-private-key
      - id: check-case-conflict
      - id: requirements-txt-fixer
      - id: fix-encoding-pragma
        args: [--remove]

  # ── Code formatting ──
  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black
        language_version: python

  - repo: https://github.com/PyCQA/isort
    rev: 7.0.0
    hooks:
      - id: isort

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [ --py312-plus ]

  # ── Linting ──
  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8

  # ── Type checking + Unit tests (via make check) ──
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash -c 'make types'
        language: system
        pass_filenames: false
        always_run: true

      - id: unit-tests
        name: unit tests
        entry: bash -c 'docker exec conduit-postgres psql -U conduit -tc "SELECT 1 FROM pg_database WHERE datname='"'"'conduit_test'"'"'" | grep -q 1 || docker exec conduit-postgres psql -U conduit -c "CREATE DATABASE conduit_test;" && APP_ENV=test python -m pytest ./tests/services --tb=short -q'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: e2e-tests
        name: e2e tests + coverage (min 80%)
        entry: bash -c 'docker exec conduit-postgres psql -U conduit -tc "SELECT 1 FROM pg_database WHERE datname='"'"'conduit_test'"'"'" | grep -q 1 || docker exec conduit-postgres psql -U conduit -c "CREATE DATABASE conduit_test;" && APP_ENV=test python -m pytest ./tests --cov=./conduit --cov-fail-under=80 --tb=short -q'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
